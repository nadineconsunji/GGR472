<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!-- Make layout responsive on other/mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Website title displayed in browser tab -->
    <title>CATF GGR472</title>
    <!-- Mapbox GL JS library (JavaScript loaded in for interactive maps) -->
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.js'></script>
    <!-- Mapbox GL CSS (CSS loaded in for styling) -->
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.css' rel='stylesheet' />
    <!-- Mapbox geocoder plugin -->
    <script
        src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.1.0/mapbox-gl-geocoder.min.js"></script>
    <link rel="stylesheet"
        href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.1.0/mapbox-gl-geocoder.css"
        type="text/css">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Bootstrap CSS (for responsive layout/grids) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <!--linking to bootstrap SEE BELOW -->
    <!-- Turf.js -->
    <script src='https://unpkg.com/@turf/turf@7.2.0/turf.min.js'></script>
</head>

<body>
    <div id="my-map" class="map-container">
        <!-- Navigation Bar -->
        <div id="left" class="sidebar flex-center left collapsed">

            <div class="sidebar-content rounded-rect flex-center">
                <!-- Original View Button -->
                <div class='map-search-container'>
                    <button type="button" class="btn btn-success btn-lg rounded-pill shadow-sm" id="returnbutton">Return
                        to original view (click neon point on map to test!!!)</button>
                </div>

                <!-- Filter features -->
                <div class='map-data-container'>
                    <label class="option-label" for="layercheck">Filter map view</label>
                    <!-- Dropdown for selecting a neighbourhood near UofT -->
                    <form>
                        <fieldset id="boundaryfieldset">
                            <label class="option-label">Select region</label>
                            <select id="boundary" name="boundary">
                                <option value="" disabled selected>Select...</option>
                                <option value="All">Show all regions</option>
                                <option value="North">North</option>
                                <option value="South">South</option>
                                <option value="West">West</option>
                                <option value="East">East</option>
                            </select>
                        </fieldset>
                    </form>
                </div>
                <div class="sidebar-toggle rounded-rect left" onclick="toggleSidebar('left')">
                    &rarr;
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap and JS Script Links -->
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>

</html>
