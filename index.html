<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="my-map" class="map-container">
        <!-- Navigation bar -->
        <div class='map-search-container'>
            <button type="button" class="btn btn-success btn-lg rounded-pill shadow-sm" id="returnbutton">Original View</button>
        </div>

        <!-- Filter features -->
        <div class='map-data-container'>
            <label class="option-label" for="layercheck">Filter map view</label>
            <!-- Dropdown for selecting a neighbourhood near UofT -->
                <form>
                    <fieldset id="boundaryfieldset">
                        <label class="option-label">Select region</label>
                        <select id="boundary" name="boundary">
                            <option value="" disabled selected>Select...</option>
                            <option value="All">Show all regions</option>
                            <option value="North">North</option>
                            <option value="South">South</option>
                            <option value="West">West</option>
                            <option value="East">East</option>
                        </select>
                    </fieldset>
                </form>
        </div>

    </div>
    <script src="script.js"></script>
</body>

</html>
